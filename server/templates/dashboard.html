<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — MT5 Cloud</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#0d1117; color:#e6edf3; display:flex; min-height:100vh; }
        .sidebar { width:200px; background:#161b22; border-right:1px solid #30363d; padding:24px; display:flex; flex-direction:column; }
        .sidebar h2 { font-size:15px; margin-bottom:24px; }
        .sidebar a { display:block; padding:8px 12px; border-radius:6px; color:#8b949e; text-decoration:none; font-size:13px; margin-bottom:2px; }
        .sidebar a:hover, .sidebar a.active { background:#1c2128; color:#58a6ff; }
        .sidebar .logout { margin-top:auto; color:#f85149; }
        .main { flex:1; padding:32px; overflow-y:auto; }

        .card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:24px; margin-bottom:20px; }
        .card-title { font-size:16px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
        .badge { display:inline-block; padding:2px 10px; border-radius:10px; font-size:12px; font-weight:500; }
        .badge-green { background:#1a3a2a; color:#3fb950; }
        .badge-red { background:#3a1a1a; color:#f85149; }
        .badge-gray { background:#21262d; color:#8b949e; }

        .stat-row { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
        .stat-box { background:#0d1117; border:1px solid #30363d; border-radius:8px; padding:12px; flex:1; min-width:100px; text-align:center; }
        .stat-box .label { font-size:11px; color:#8b949e; }
        .stat-box .value { font-size:20px; font-weight:700; margin-top:4px; }

        .btn { padding:8px 16px; border:1px solid #30363d; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; background:#21262d; color:#e6edf3; }
        .btn:hover { background:#30363d; }
        .btn-orange { background:#9e6a03; border-color:#bb8009; }
        .btn-orange:hover { background:#bb8009; }

        .ea-table { width:100%; border-collapse:collapse; font-size:13px; }
        .ea-table th { text-align:left; font-size:11px; color:#8b949e; padding:8px; border-bottom:1px solid #30363d; cursor:pointer; }
        .ea-table td { padding:6px 8px; border-bottom:1px solid #21262d; }
        .ea-table tr:hover td { background:#1c2128; }
        .ea-table select, .ea-table input { background:#0d1117; border:1px solid #30363d; border-radius:4px; color:#e6edf3; padding:3px 4px; font-size:12px; }
        .ea-table select { max-width:110px; cursor:pointer; }
        .ea-table input { width:55px; text-align:center; }

        .scroll-box { max-height:450px; overflow-y:auto; }
        .scroll-box::-webkit-scrollbar { width:6px; }
        .scroll-box::-webkit-scrollbar-thumb { background:#30363d; border-radius:3px; }

        .corr-table { font-size:11px; }
        .corr-table th, .corr-table td { padding:4px 8px; text-align:center; }
        .corr-table th { min-width:50px; }
        .log-box { background:#0d1117; border:1px solid #30363d; border-radius:8px; padding:12px; font-family:monospace; font-size:12px; max-height:150px; overflow-y:auto; margin-top:12px; display:none; }
        .log-box.show { display:block; }
        .log-success { color:#3fb950; }
        .log-error { color:#f85149; }
        .log-info { color:#58a6ff; }
        .loading { display:inline-block; width:14px; height:14px; border:2px solid #30363d; border-top-color:#58a6ff; border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>☁️ MT5 Cloud</h2>
    <a href="/dashboard" class="active">📊 Dashboard</a>
    <a href="/logout" class="logout">🚪 Logout</a>
</div>

<div class="main">
    <h1 style="margin-bottom:20px">📊 Dashboard</h1>

    <!-- Agent Status -->
    <div class="card">
        <div class="card-title">📡 Agent <span id="statusBadge" class="badge badge-gray">Unknown</span></div>
        <div class="stat-row">
            <div class="stat-box"><div class="label">Agent ID</div><div class="value" id="agentId" style="font-size:14px">—</div></div>
            <div class="stat-box"><div class="label">Balance</div><div class="value" id="balance">—</div></div>
            <div class="stat-box"><div class="label">Equity</div><div class="value" id="equity">—</div></div>
            <div class="stat-box"><div class="label">Positions</div><div class="value" id="posCount">0</div></div>
        </div>
    </div>

    <!-- EA 配對表 -->
    <div class="card">
        <div class="card-title">📦 EA 配對表 <span id="eaCount" class="badge">0</span></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
            <button class="btn" onclick="loadEAConfig()">🔄 重新整理</button>
            <button class="btn btn-orange" onclick="saveEAConfig()">💾 儲存配對</button>
            <span style="display:flex;align-items:center;gap:4px;margin-left:8px">
                <span style="font-size:12px;color:#8b949e">Lots:</span>
                <input type="number" id="defaultLot" value="0.01" min="0.01" max="100" step="0.01" style="width:55px;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#e6edf3;padding:3px 6px;font-size:13px;text-align:center">
                <button class="btn" onclick="applyAllLots()" style="padding:4px 10px;font-size:12px">📋 全部</button>
            </span>
        </div>
        <div id="logBox" class="log-box"></div>
        <div class="scroll-box">
            <table class="ea-table">
                <thead><tr>
                    <th>EA</th><th>Symbol</th><th>TF</th><th style="cursor:pointer" onclick="sortEA('trades')">Trades 📊</th><th style="cursor:pointer" onclick="sortEA('winrate')">Win 🏆</th><th style="cursor:pointer" onclick="sortEA('profit')">P&L 💰</th><th>Lots ✏️</th>
                </tr></thead>
                <tbody id="eaTableBody"><tr><td colspan="7" style="text-align:center;padding:30px;color:#8b949e">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>

    <!-- Analysis -->
    <div class="card">
        <div class="card-title">📊 Performance</div>
        <div class="stat-row" id="summaryStats">
            <div class="stat-box"><div class="label">Trades</div><div class="value" id="anTrades">—</div></div>
            <div class="stat-box"><div class="label">Win Rate</div><div class="value" id="anWinRate" style="color:#3fb950">—</div></div>
            <div class="stat-box"><div class="label">Profit Factor</div><div class="value" id="anPF">—</div></div>
            <div class="stat-box"><div class="label">Total P&L</div><div class="value" id="anProfit">—</div></div>
        </div>
    </div>

    <!-- Correlation -->
    <div class="card">
        <div class="card-title">🔗 Correlation Matrix</div>
        <div style="overflow-x:auto"><table class="ea-table corr-table" id="corrTable"></table></div>
    </div>
</div>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
<script>
const socket = io();

// === EA Config ===
let eaMappings = {};
let allSymbols = [];
let analysisData = null;
let sortOrder = {};

async function loadEAConfig() {
    try {
        const res = await fetch('/api/ea-config');
        const data = await res.json();
        eaMappings = data.mappings || {};
        allSymbols = data.all_symbols || ['EURUSD','GBPUSD','USDJPY','XAUUSD'];

        // Default 30 EAs
        const defaultEAs = ["SMA_Cross","EMA_Cross","RSI_Over","MACD_Cross","Bollinger_Band","Stochastic","ADX_Trend","ATR_Stop","Ichimoku","Parabolic_SAR","Heikin_Ashi","Volume_Spike","Support_Resist","Price_Action","Breakout","Trend_Follow","Scalping_M1","Grid_Trading","Martingale","Hedge_Fund","News_Trader","Swing_Trader","Divergence","Multi_TimeFrame","Correlation","Mean_Reversion","Momentum","Fibonacci","Seasonal","Machine_Learn"];

        const dl = eaMappings['_default_lot'] || 0.01;
        document.getElementById('defaultLot').value = dl;

        let html = '';
        defaultEAs.forEach(name => {
            const sym = eaMappings[name] || allSymbols[0];
            const tf = eaMappings[name+'_tf'] || 'H1';
            const lot = eaMappings[name+'_lot'] || dl;

            // 從 analysis 攞 data
            const eaData = analysisData ? analysisData.per_ea.find(e => e.ea.includes(name)) : null;
            const trades = eaData ? eaData.trades : 0;
            const wr = eaData ? eaData.win_rate : 0;
            const profit = eaData ? eaData.profit : 0;

            html += `<tr>
                <td><b>${name}</b></td>
                <td><select class="ea-sym" data-ea="${name}">${allSymbols.map(s => `<option ${s===sym?'selected':''}>${s}</option>`).join('')}</select></td>
                <td><select class="ea-tf" data-ea="${name}">${['M1','M5','M15','M30','H1','H4','D1','W1','MN1'].map(t => `<option ${t===tf?'selected':''}>${t}</option>`).join('')}</select></td>
                <td style="text-align:center;color:${trades>0?'#e6edf3':'#484f58'}">${trades>0?trades:'—'}</td>
                <td style="text-align:center;color:${wr>=60?'#3fb950':wr>0?'#d29922':'#484f58'}">${wr>0?wr+'%':'—'}</td>
                <td style="text-align:right;color:${profit>0?'#3fb950':profit<0?'#f85149':'#484f58'};font-weight:${profit!==0?'600':'400'}">${profit!==0?(profit>0?'+':'')+'$'+profit.toFixed(2):'—'}</td>
                <td><input type="number" class="ea-lot" data-ea="${name}" value="${lot}" min="0.01" max="100" step="0.01"></td>
            </tr>`;
        });

        document.getElementById('eaTableBody').innerHTML = html;
        document.getElementById('eaCount').textContent = defaultEAs.length;
    } catch(e) { console.error(e); }
}

function applyAllLots() {
    const val = parseFloat(document.getElementById('defaultLot').value) || 0.01;
    document.querySelectorAll('.ea-lot').forEach(i => i.value = val.toFixed(2));
}

async function saveEAConfig() {
    const mappings = {};
    mappings['_default_lot'] = parseFloat(document.getElementById('defaultLot').value) || 0.01;
    document.querySelectorAll('.ea-sym').forEach(sel => {
        const name = sel.dataset.ea;
        mappings[name] = sel.value;
        mappings[name+'_tf'] = document.querySelector(`.ea-tf[data-ea="${name}"]`).value;
        mappings[name+'_lot'] = parseFloat(document.querySelector(`.ea-lot[data-ea="${name}"]`).value) || 0.01;
    });
    await fetch('/api/ea-config', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({mappings})
    });
    showLog('✅ EA config saved!');
}

function showLog(msg, cls='log-success') {
    const box = document.getElementById('logBox');
    if (!box) return;
    box.classList.add('show');
    const div = document.createElement('div');
    div.className = cls;
    div.textContent = msg;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

// === Dashboard ===
async function loadDashboard() {
    try {
        const res = await fetch('/api/dashboard');
        const d = await res.json();
        document.getElementById('agentId').textContent = d.agent_id || '—';
        document.getElementById('balance').textContent = d.account ? '$'+d.account.balance?.toLocaleString() : '—';
        document.getElementById('equity').textContent = d.account ? '$'+d.account.equity?.toLocaleString() : '—';

        const badge = document.getElementById('statusBadge');
        if (d.status === 'connected' || d.status === 'running') {
            badge.textContent = '🟢 Online'; badge.className = 'badge badge-green';
        } else {
            badge.textContent = '🔴 Offline'; badge.className = 'badge badge-red';
        }

        document.getElementById('posCount').textContent = (d.positions||[]).length;
    } catch(e) {}
}

// === Analysis ===
async function loadAnalysis() {
    try {
        const res = await fetch('/api/analysis');
        if (!res.ok) return;
        analysisData = await res.json();
        if (analysisData.error) return;

        const s = analysisData.summary;
        document.getElementById('anTrades').textContent = s.total_trades;
        document.getElementById('anWinRate').textContent = s.win_rate+'%';
        document.getElementById('anProfit').textContent = (s.total_profit>=0?'+':'')+'$'+s.total_profit.toFixed(2);
        document.getElementById('anProfit').style.color = s.total_profit>=0?'#3fb950':'#f85149';
        document.getElementById('anPF').textContent = s.wins&&s.losses ? (s.wins/s.losses).toFixed(2) : '∞';

        // 更新 EA 表
        loadEAConfig();

        // Correlation Matrix
        if (analysisData.correlation_matrix && analysisData.correlation_matrix.length > 1) {
            let keys = analysisData.correlation_keys;
            let cm = '<thead><tr><th style="min-width:70px">EA</th>';
            keys.forEach(k => { cm += `<th>${k.length>12?k.substring(0,10)+'..':k}</th>`; });
            cm += '</tr></thead><tbody>';
            analysisData.correlation_matrix.forEach(row => {
                cm += `<tr><td style="font-size:10px">${row.ea.length>12?row.ea.substring(0,10)+'..':row.ea}</td>`;
                keys.forEach(k => {
                    let v = row[k]||0;
                    let c = v>0.5?'#3fb950':v>0?'#2d6a3a':v<-0.5?'#f85149':v<0?'#6a2d2d':'#484f58';
                    cm += `<td style="color:${c};font-weight:${Math.abs(v)>0.5?'600':'400'}">${v.toFixed(2)}</td>`;
                });
                cm += '</tr>';
            });
            document.getElementById('corrTable').innerHTML = cm;
        }
    } catch(e) {}
}

// Init
loadDashboard();
loadEAConfig();
loadAnalysis();
setInterval(loadDashboard, 5000);
setInterval(loadAnalysis, 10000);
</script>
</body>
</html>
